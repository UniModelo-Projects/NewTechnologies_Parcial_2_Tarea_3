name: Azure App Service CI/CD (with ACR Admin)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/appservice.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: apptarea3ntacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          cd app
          docker build -t apptarea3ntacr.azurecr.io/azure-demo-app:${{ github.sha }} .
          docker push apptarea3ntacr.azurecr.io/azure-demo-app:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-tarea3-nt-webapp'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'apptarea3ntacr.azurecr.io/azure-demo-app:${{ github.sha }}'
